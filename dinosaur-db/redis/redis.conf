# =============================================================================
# Redis - Configuración para entorno productivo
# Challenge Froneus — Backend Java Developer
# =============================================================================

# -------------------------------------
# RED
# -------------------------------------
bind 0.0.0.0
port 6379
protected-mode no

# -------------------------------------
# MEMORIA Y EVICCIÓN
# -------------------------------------
maxmemory 256mb
maxmemory-policy allkeys-lru

# -------------------------------------
# PERSISTENCIA — AOF (Append Only File)
# Garantiza durabilidad de idempotency keys ante reinicios
# -------------------------------------
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# -------------------------------------
# PERSISTENCIA — RDB Snapshots
# -------------------------------------
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# -------------------------------------
# LOGS
# -------------------------------------
loglevel notice
logfile ""

# -------------------------------------
# TIMEOUTS Y KEEPALIVE
# -------------------------------------
timeout 0
tcp-keepalive 300

# -------------------------------------
# SEGURIDAD (descomentar en producción real con contraseña)
# requirepass your_strong_password_here
# -------------------------------------
