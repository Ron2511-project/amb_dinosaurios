# =============================================================================
# Challenge Froneus — Backend Java Developer
# Stack: PostgreSQL 16 + Redis 7
# Arquitectura: CQRS (Write Model + Read Model) + Idempotencia en Redis
#
# USO:
#   Levantar todo:     docker compose up -d
#   Ver logs:          docker compose logs -f
#   Detener:           docker compose down
#   Detener + borrar:  docker compose down -v   ⚠️  elimina los datos
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL 16
  # Los scripts SQL en ./sql/ se ejecutan automáticamente en orden numérico
  # al inicializar el contenedor por primera vez.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: froneus_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-froneus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-froneus_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-froneus_db}
      PGDATA:            /var/lib/postgresql/data/pgdata

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Scripts de inicialización — se ejecutan en orden alfabético/numérico
      # SOLO cuando el volumen de datos está vacío (primera vez)
      - ./sql/01_postgres_setup.sql:/docker-entrypoint-initdb.d/01_postgres_setup.sql:ro
      - ./sql/02_write_model.sql:/docker-entrypoint-initdb.d/02_write_model.sql:ro
      - ./sql/03_read_model.sql:/docker-entrypoint-initdb.d/03_read_model.sql:ro
      - ./sql/04_sync_and_triggers.sql:/docker-entrypoint-initdb.d/04_sync_and_triggers.sql:ro
      # Volumen persistente para los datos
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-froneus} -d ${POSTGRES_DB:-froneus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - froneus_net

  # ---------------------------------------------------------------------------
  # REDIS 7
  # Usado para idempotency keys con TTL automático de 24 horas.
  # Configuración productiva con persistencia AOF + RDB.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: froneus_redis
    restart: unless-stopped

    command: redis-server /usr/local/etc/redis/redis.conf

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - froneus_net

  # ---------------------------------------------------------------------------
  # PGADMIN 4 (opcional — interfaz web para explorar la BD)
  # Acceder en: http://localhost:5050
  # Login: admin@froneus.com / admin
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: froneus_pgadmin
    restart: unless-stopped
    profiles:
      - tools   # Solo se levanta con: docker compose --profile tools up -d

    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@froneus.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - froneus_net

# =============================================================================
# VOLÚMENES PERSISTENTES
# =============================================================================
volumes:
  postgres_data:
    name: froneus_postgres_data
  redis_data:
    name: froneus_redis_data

# =============================================================================
# RED INTERNA
# =============================================================================
networks:
  froneus_net:
    name: froneus_network
    driver: bridge
