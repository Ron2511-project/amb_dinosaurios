# =============================================================================
# AMB_DINOSAURIOS — docker-compose.yml raíz
# Levanta todo el stack con un solo comando: docker compose up --build
#
# Servicios:
#   postgres         → PostgreSQL 16 con schema CQRS (scripts en dinosaur-db/sql/)
#   redis            → Redis 7 para idempotencia (config en dinosaur-db/redis/)
#   dinosaur-service → Microservicio Java Spring Boot
#   pgadmin          → Interfaz web (opcional: --profile tools)
#
# Credenciales (ver .env para cambiarlas):
#   Postgres:  froneus / froneus_pass / froneus_db
#   pgAdmin:   admin@froneus.com / admin  →  http://localhost:5050
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL 16 — Write Model + Read Model (CQRS)
  # Los scripts SQL se ejecutan en orden numérico al inicializar por primera vez.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: froneus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-froneus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-froneus_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-froneus_db}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./dinosaur-db/sql/01_postgres_setup.sql:/docker-entrypoint-initdb.d/01_postgres_setup.sql:ro
      - ./dinosaur-db/sql/02_write_model.sql:/docker-entrypoint-initdb.d/02_write_model.sql:ro
      - ./dinosaur-db/sql/03_read_model.sql:/docker-entrypoint-initdb.d/03_read_model.sql:ro
      - ./dinosaur-db/sql/04_sync_and_triggers.sql:/docker-entrypoint-initdb.d/04_sync_and_triggers.sql:ro
      - ./dinosaur-db/sql/05_seed_data.sql:/docker-entrypoint-initdb.d/05_seed_data.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-froneus} -d ${POSTGRES_DB:-froneus_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - froneus_net

  # ---------------------------------------------------------------------------
  # REDIS 7 — Idempotencia con TTL 24h (AOF + LRU)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: froneus_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./dinosaur-db/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - froneus_net

  # ---------------------------------------------------------------------------
  # DINOSAUR SERVICE — Microservicio Java Spring Boot
  # Se conecta a postgres y redis por nombre de servicio dentro de froneus_net.
  # ---------------------------------------------------------------------------
  dinosaur-service:
    build:
      context: ./dinosaur-service
      dockerfile: Dockerfile
    container_name: dinosaur_service
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${POSTGRES_DB:-froneus_db}
      DB_USER:     ${POSTGRES_USER:-froneus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-froneus_pass}
      REDIS_HOST:  redis
      REDIS_PORT:  ${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - froneus_net

  # ---------------------------------------------------------------------------
  # PGADMIN 4 — Interfaz web (opcional)
  # Levantar con: docker compose --profile tools up
  # Acceder en:   http://localhost:5050
  # Login:        admin@froneus.com / admin
  # Host BD:      postgres  (nombre del servicio, NO localhost)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: froneus_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@froneus.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - froneus_net

# =============================================================================
volumes:
  postgres_data:
    name: froneus_postgres_data
  redis_data:
    name: froneus_redis_data

networks:
  froneus_net:
    name: froneus_network
    driver: bridge
